# Auto-fix the mechanical rules (blank-line spacing, list indentation, emphasis
# style, ...) the same way ruff-format does for Python.
fix: true
config:
  # MD013 line-length: docs contain long lines / tables.
  MD013: false
  # MD033 no-inline-html: docs embed <p>/<code> HTML tags.
  MD033: false
  # MD024 duplicate-heading: RELEASE.md changelogs repeat "### Improvements" and
  # even the same "## Release ... <version>" heading across sections; allow all.
  MD024: false
  # MD040 fenced-code-language: README embeds plain directory-tree / output blocks.
  MD040: false
  # MD041 first-line-heading: README opens with the HTML branding/logo header.
  MD041: false
  # MD045 image-alt-text: the branding header uses <img> logos / social icons.
  MD045: false
  # MD025 single-h1: RELEASE.md is a changelog where every release is its own
  # top-level "# Release ... <version>" heading.
  MD025: false
  # MD035 hr-style: RELEASE.md separates releases with hand-typed asterisk rules
  # of slightly varying length; not worth normalizing (and the auto-fixer errors).
  MD035: false
  # MD053 link-reference-definitions: README uses `[comment]: <> (...)` markers
  # (START/END OF GITHUB README) as delimiters the release tooling relies on;
  # they look like "unused" reference definitions, so the auto-fixer would delete
  # them. Keep them.
  MD053: false
globs:
  - "*.md"
ignores:
  - "api/**"
  - "src/ondewo-vtsi-api/**"
  - "ondewo-proto-compiler/**"
  - "node_modules/**"
  - ".venv/**"
